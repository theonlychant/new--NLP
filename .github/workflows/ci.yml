name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Build Rust (crate)
        working-directory: rust_module
        run: |
          cargo build --release

      - name: Run Rust tests
        working-directory: rust_module
        run: |
          cargo test --verbose

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run Go smoke test (stub)
        run: |
          cd go_module
          go run . -text "ci smoke" -stub

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Run Python tests
        run: |
          pip install pytest
          pytest -q

      - name: Setup Node (for JS tests)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install JS deps
        working-directory: js_module
        run: |
          npm ci --silent || npm install --silent

      - name: Run JS tests (Jest or fallback)
        working-directory: js_module
        run: |
          # try running Jest; if Node version or environment prevents it, fall back to the compat runner
          npm test || node run_node_tests.js
